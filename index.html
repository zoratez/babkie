<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babka Rave - Uh! Edition</title>
    <style>
        body {
            background-color: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Consolas', monospace;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 700px;
            aspect-ratio: 2/3;
        }

        canvas {
            background-color: #1b1e2b;
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            transition: background-color 0.1s ease;
        }

        /* STYLIZACJA JOYSTICKA */
        #joystick-base {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 140px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(55, 142, 204, 0.3);
            border-radius: 50%;
            display: none;
            /* Pokażemy tylko na mobile */
            touch-action: none;
            z-index: 20;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background-color: rgba(55, 142, 204, 0.7);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(55, 142, 204, 0.8);
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            background-color: rgba(20, 20, 30, 0.95);
            color: white;
            text-align: center;
            padding: 20px;
            border: 2px solid #378ecc;
            border-radius: 10px;
            z-index: 30;
            cursor: pointer;
        }

        #game-over-screen {
            border-color: #c74242;
            display: none;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: clamp(18px, 5vw, 24px);
        }

        p {
            margin: 5px 0;
            font-size: clamp(14px, 4vw, 16px);
        }

        .high-score-text {
            color: #52a349;
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        #score-display {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="score-display">PUNKTEJ: 0</div>

        <div id="start-screen" class="overlay" onclick="startGame()">
            <p>DAJUDŻIK arba szpauszk ENTER</p>
            <span id="high-score-start" class="high-score-text">REKORDASZ: 0</span>
        </div>

        <div id="game-over-screen" class="overlay" onclick="startGame()">
            <h2 style="color: #c74242;">CZURWA!</h2>
            <p id="final-score">TAVO WYNIKASZ: 0</p>
            <p id="high-score-end" style="font-size: 13px; color: #aaa;">GERAUSZASZ: 0</p>
            <p style="margin-top: 15px;">Dajudżik, kad pradiet da rożu, o an kompuczero szpauszk R</p>
        </div>

        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const highScoreStartEl = document.getElementById('high-score-start');
        const highScoreEndEl = document.getElementById('high-score-end');
        const finalScoreEl = document.getElementById('final-score');

        // Joystick Elements
        const joyBase = document.getElementById('joystick-base');
        const joyKnob = document.getElementById('joystick-knob');

        // Pokaż joystick tylko na urządzeniach dotykowych
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            joyBase.style.display = 'block';
        }

        // AUDIO
        const bgMusic = new Audio('muzyka.mp3');
        bgMusic.loop = true;
        const crashSound = new Audio('uh.mp3');

        const BPM = 154;
        const DISCO_INTERVAL = 60000 / BPM;
        let discoTimer;
        let discoDelayTimeout;
        const DISCO_COLORS = ['#1b1e2b', '#2b1b26', '#1b2b1e', '#2b281b', '#1b262b'];
        let currentDiscoIdx = 0;

        const OBSTACLE_COLOR = '#378ecc';
        const PLAYER_WIDTH = 52;
        const PLAYER_HEIGHT = 55;
        const PRZERWA_SZEROKOSC = 115;
        const LINIA_WYSOKOSC = 18;
        const PREDKOSC_STALA = 5;

        // OBRAZKI
        const babkaImg = new Image();
        babkaImg.src = 'babka.png';
        const babkaDeadImg = new Image();
        babkaDeadImg.src = 'babka_dead.png';

        let player = { x: 200 - 26, y: 500 };
        let obstacles = [];
        let score = 0;
        let highScore = localStorage.getItem('babkaHighScore') || 0;
        let gameState = 'START';
        let lastSpawnTime = 0;
        let keys = {};

        highScoreStartEl.innerText = `REKORDASZ: ${highScore}`;

        // --- LOGIKA JOYSTICKA ---
        let joyData = { active: false, x: 0 };
        const joyLimit = 50;

        joyBase.addEventListener('touchstart', (e) => { joyData.active = true; });
        window.addEventListener('touchend', () => {
            joyData.active = false;
            joyKnob.style.left = '50%';
            joyData.x = 0;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joyData.active) return;
            const touch = e.touches[0];
            const baseRect = joyBase.getBoundingClientRect();
            const centerX = baseRect.left + baseRect.width / 2;
            let deltaX = touch.clientX - centerX;
            if (deltaX > joyLimit) deltaX = joyLimit;
            if (deltaX < -joyLimit) deltaX = -joyLimit;
            joyKnob.style.left = `calc(50% + ${deltaX}px)`;
            joyData.x = deltaX / joyLimit;
        }, { passive: false });

        // --- STEROWANIE KLAWIATURĄ ---
        window.addEventListener('keydown', (e) => {
            if (gameState === 'START' && e.code === 'Enter') startGame();
            if (gameState === 'GAMEOVER' && e.code === 'KeyR') startGame();
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function changeBackground() {
            if (gameState === 'PLAYING') {
                currentDiscoIdx = (currentDiscoIdx + 1) % DISCO_COLORS.length;
                canvas.style.backgroundColor = DISCO_COLORS[currentDiscoIdx];
            }
        }

        function startGame() {
            bgMusic.currentTime = 0;
            bgMusic.play();

            clearInterval(discoTimer);
            clearTimeout(discoDelayTimeout);
            canvas.style.backgroundColor = '#1b1e2b';

            discoDelayTimeout = setTimeout(() => {
                if (gameState === 'PLAYING') {
                    discoTimer = setInterval(changeBackground, DISCO_INTERVAL);
                }
            }, 24800);

            player.x = 200 - 26;
            obstacles = [];
            score = 0;
            scoreEl.innerText = `PUNKTEJ: 0`;
            gameState = 'PLAYING';
            lastSpawnTime = Date.now();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
        }

        function checkCollision(obs) {
            const margin = 8;
            const pLeft = player.x + margin;
            const pRight = player.x + PLAYER_WIDTH - margin;
            const pTop = player.y + margin;
            const pBottom = player.y + PLAYER_HEIGHT - margin;
            const inLineY = pBottom > obs.y && pTop < obs.y + LINIA_WYSOKOSC;
            const hitWallX = pLeft < obs.gapX || pRight > obs.gapX + PRZERWA_SZEROKOSC;
            return inLineY && hitWallX;
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Sterowanie Joystickiem (Mobile)
            if (joyData.active) {
                player.x += joyData.x * 8;
            }

            // Sterowanie Klawiszami (PC)
            if (keys['ArrowLeft']) player.x -= 7;
            if (keys['ArrowRight']) player.x += 7;

            // Granice ekranu
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - PLAYER_WIDTH) player.x = canvas.width - PLAYER_WIDTH;

            const now = Date.now();
            if (now - lastSpawnTime > 1200) {
                const gapX = Math.floor(Math.random() * (canvas.width - PRZERWA_SZEROKOSC - 40)) + 20;
                obstacles.push({ y: -50, gapX: gapX });
                lastSpawnTime = now;
            }
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += PREDKOSC_STALA;
                if (checkCollision(obs)) {
                    gameState = 'GAMEOVER';

                    bgMusic.pause();
                    bgMusic.currentTime = 0;
                    crashSound.play();

                    clearInterval(discoTimer);
                    clearTimeout(discoDelayTimeout);

                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('babkaHighScore', highScore);
                    }

                    finalScoreEl.innerText = `WYNIKASZ: ${score}`;
                    highScoreEndEl.innerText = `TAVO GERAUSZASZ WYNIKASZ: ${highScore}`;
                    highScoreStartEl.innerText = `WYNIKASZ: ${highScore}`;

                    canvas.style.backgroundColor = '#1b1e2b';
                    gameOverScreen.style.display = 'block';
                }
                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = `PUNKTEJ: ${score}`;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = OBSTACLE_COLOR;
            obstacles.forEach(obs => {
                ctx.fillRect(0, obs.y, obs.gapX, LINIA_WYSOKOSC);
                const rX = obs.gapX + PRZERWA_SZEROKOSC;
                ctx.fillRect(rX, obs.y, canvas.width - rX, LINIA_WYSOKOSC);
            });

            let imgToShow = (gameState === 'GAMEOVER') ? babkaDeadImg : babkaImg;

            if (imgToShow.complete) {
                ctx.drawImage(imgToShow, player.x, player.y, PLAYER_WIDTH, PLAYER_HEIGHT);
            } else {
                ctx.fillStyle = (gameState === 'GAMEOVER') ? 'red' : 'white';
                ctx.fillRect(player.x, player.y, PLAYER_WIDTH, PLAYER_HEIGHT);
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>

</body>

</html>
