<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babka Mobile</title>
    <style>
        body {
            background-color: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Consolas', monospace;
            overflow: hidden;
            /* Blokuje przewijanie strony */
            touch-action: none;
            /* Blokuje gesty przeglądarki podczas gry */
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            /* Maksymalna szerokość na komputerze */
            height: 100%;
            max-height: 700px;
            aspect-ratio: 2/3;
        }

        canvas {
            background-color: #1b1e2b;
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            background-color: rgba(20, 20, 30, 0.95);
            color: white;
            text-align: center;
            padding: 20px;
            border: 2px solid #378ecc;
            border-radius: 10px;
            z-index: 10;
            cursor: pointer;
        }

        #game-over-screen {
            border-color: #c74242;
            display: none;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: clamp(18px, 5vw, 24px);
        }

        p {
            margin: 5px 0;
            font-size: clamp(14px, 4vw, 16px);
        }

        #score-display {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="score-display">PUNKTY: 0</div>

        <div id="start-screen" class="overlay" onclick="startGame()">
            <h2>GOTOWY?</h2>
            <p>Dotknij lub naciśnij ENTER</p>
            <p>aby rozpocząć</p>
        </div>

        <div id="game-over-screen" class="overlay" onclick="startGame()">
            <h2 style="color: #c74242;">KONIEC GRY!</h2>
            <p>Dotknij tutaj lub naciśnij R</p>
            <p>aby zacząć od nowa</p>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');

        const OBSTACLE_COLOR = '#378ecc';
        const PLAYER_WIDTH = 52;
        const PLAYER_HEIGHT = 55;
        const PRZERWA_SZEROKOSC = 115;
        const LINIA_WYSOKOSC = 18;
        const PREDKOSC_STALA = 5;

        const babkaImg = new Image();
        babkaImg.src = 'babka.png';

        let player = { x: 200 - 26, y: 500 };
        let obstacles = [];
        let score = 0;
        let gameState = 'START';
        let lastSpawnTime = 0;
        let keys = {};

        // --- STEROWANIE ---

        // Klawiatura
        window.addEventListener('keydown', (e) => {
            if (gameState === 'START' && e.code === 'Enter') startGame();
            if (gameState === 'GAMEOVER' && e.code === 'KeyR') startGame();
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Dotyk i Mysz
        function handleMove(clientX) {
            if (gameState !== 'PLAYING') return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            // Obliczamy pozycję X względem canvasu i centrujemy babkę na palcu
            let newX = (clientX - rect.left) * scaleX - (PLAYER_WIDTH / 2);

            // Granice ekranu
            if (newX < 0) newX = 0;
            if (newX > canvas.width - PLAYER_WIDTH) newX = canvas.width - PLAYER_WIDTH;

            player.x = newX;
        }

        canvas.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
            e.preventDefault(); // Blokuje scroll
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            handleMove(e.touches[0].clientX);
        }, { passive: false });

        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons > 0) handleMove(e.clientX);
        });

        // --- LOGIKA ---

        function startGame() {
            player.x = 200 - 26;
            obstacles = [];
            score = 0;
            scoreEl.innerText = `PUNKTY: 0`;
            gameState = 'PLAYING';
            lastSpawnTime = Date.now();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
        }

        function checkCollision(obs) {
            const margin = 8;
            const pLeft = player.x + margin;
            const pRight = player.x + PLAYER_WIDTH - margin;
            const pTop = player.y + margin;
            const pBottom = player.y + PLAYER_HEIGHT - margin;

            const inLineY = pBottom > obs.y && pTop < obs.y + LINIA_WYSOKOSC;
            const hitWallX = pLeft < obs.gapX || pRight > obs.gapX + PRZERWA_SZEROKOSC;

            return inLineY && hitWallX;
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Sterowanie strzałkami (nadal działa na PC)
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 7;
            if (keys['ArrowRight'] && player.x < canvas.width - PLAYER_WIDTH) player.x += 7;

            const now = Date.now();
            if (now - lastSpawnTime > 1200) {
                const gapX = Math.floor(Math.random() * (canvas.width - PRZERWA_SZEROKOSC - 40)) + 20;
                obstacles.push({ y: -50, gapX: gapX });
                lastSpawnTime = now;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += PREDKOSC_STALA;

                if (checkCollision(obs)) {
                    gameState = 'GAMEOVER';
                    gameOverScreen.style.display = 'block';
                }

                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = `PUNKTY: ${score}`;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = OBSTACLE_COLOR;
            obstacles.forEach(obs => {
                ctx.fillRect(0, obs.y, obs.gapX, LINIA_WYSOKOSC);
                const rX = obs.gapX + PRZERWA_SZEROKOSC;
                ctx.fillRect(rX, obs.y, canvas.width - rX, LINIA_WYSOKOSC);
            });

            if (babkaImg.complete) {
                ctx.drawImage(babkaImg, player.x, player.y, PLAYER_WIDTH, PLAYER_HEIGHT);
            } else {
                ctx.fillStyle = 'white';
                ctx.fillRect(player.x, player.y, PLAYER_WIDTH, PLAYER_HEIGHT);
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>

</body>

</html>
