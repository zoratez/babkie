<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babka Rave - Pro Arrows</title>
    <style>
        body {
            background-color: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Consolas', monospace;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 700px;
            aspect-ratio: 2/3;
        }

        canvas {
            background-color: #1b1e2b;
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            transition: background-color 0.1s ease;
        }

        /* STRZAŁKI JESZCZE TROCHĘ WYŻEJ */
        #mobile-controls {
            position: absolute;
            bottom: 170px;
            /* PODNIESIONE Z 140px NA 170px */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: none;
            justify-content: space-between;
            z-index: 20;
        }

        .arrow-btn {
            width: 85px;
            height: 85px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(55, 142, 204, 0.5);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(5px);
        }

        .arrow-btn:active {
            background-color: rgba(55, 142, 204, 0.4);
            border-color: white;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            background-color: rgba(20, 20, 30, 0.95);
            color: white;
            text-align: center;
            padding: 20px;
            border: 2px solid #378ecc;
            border-radius: 10px;
            z-index: 1000;
            cursor: pointer;
        }

        #game-over-screen {
            border-color: #c74242;
            display: none;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: clamp(18px, 5vw, 24px);
        }

        p {
            margin: 5px 0;
            font-size: clamp(14px, 4vw, 16px);
        }

        .high-score-text {
            color: #52a349;
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        #score-display {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="score-display">PUNKTEJ: 0</div>

        <div id="start-screen" class="overlay" onclick="startGame()">
            <p>PASZPAUSZK szica arba ENTER</p>
            <span id="high-score-start" class="high-score-text">REKORDASZ: 0</span>
        </div>

        <div id="game-over-screen" class="overlay" onclick="startGame()">
            <h2 style="color: #c74242;">CZURWA!</h2>
            <p id="final-score">TAVO WYNIKASZ: 0</p>
            <p id="high-score-end" style="font-size: 13px; color: #aaa;">GERAUSZASZ: 0</p>
            <p style="margin-top: 15px;">DAJUDŻIK arba paszpauszk ENTER, kad pradiet da rożu</p>
        </div>

        <div id="mobile-controls">
            <div id="btn-left" class="arrow-btn">◀</div>
            <div id="btn-right" class="arrow-btn">▶</div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const highScoreStartEl = document.getElementById('high-score-start');
        const highScoreEndEl = document.getElementById('high-score-end');
        const finalScoreEl = document.getElementById('final-score');

        const mobileControls = document.getElementById('mobile-controls');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        function detectMobile() {
            const isTouch = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
            const isNarrow = window.innerWidth < 600;
            if (isTouch || isNarrow) mobileControls.style.display = 'flex';
        }
        detectMobile();

        const bgMusic = new Audio('muzyka.mp3');
        bgMusic.loop = true;
        const crashSound = new Audio('uh.mp3');

        const BPM = 154;
        const DISCO_INTERVAL = 60000 / BPM;
        let discoTimer, discoDelayTimeout;
        const DISCO_COLORS = ['#1b1e2b', '#2b1b26', '#1b2b1e', '#2b281b', '#1b262b'];
        let currentDiscoIdx = 0;

        const OBSTACLE_COLOR = '#378ecc';
        const PLAYER_WIDTH = 52, PLAYER_HEIGHT = 55;
        const PRZERWA_SZEROKOSC = 115, LINIA_WYSOKOSC = 18;
        const PREDKOSC_STALA = 5;

        const babkaImg = new Image(); babkaImg.src = 'babka.png';
        const babkaDeadImg = new Image(); babkaDeadImg.src = 'babka_dead.png';

        let player = { x: 200 - 26, y: 500 };
        let obstacles = [], score = 0, keys = {};
        let touchLeft = false, touchRight = false;
        let highScore = localStorage.getItem('babkaHighScore') || 0;
        let gameState = 'START';
        let lastSpawnTime = 0;

        highScoreStartEl.innerText = `REKORDASZ: ${highScore}`;

        btnLeft.addEventListener('touchstart', (e) => { touchLeft = true; e.preventDefault(); });
        btnLeft.addEventListener('touchend', () => { touchLeft = false; });
        btnRight.addEventListener('touchstart', (e) => { touchRight = true; e.preventDefault(); });
        btnRight.addEventListener('touchend', () => { touchRight = false; });

        btnLeft.addEventListener('mousedown', () => { touchLeft = true; });
        window.addEventListener('mouseup', () => { touchLeft = false; touchRight = false; });
        btnRight.addEventListener('mousedown', () => { touchRight = true; });

        window.addEventListener('keydown', (e) => {
            if (gameState === 'START' && e.code === 'Enter') startGame();
            if (gameState === 'GAMEOVER' && e.code === 'KeyR') startGame();
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function changeBackground() {
            if (gameState === 'PLAYING') {
                currentDiscoIdx = (currentDiscoIdx + 1) % DISCO_COLORS.length;
                canvas.style.backgroundColor = DISCO_COLORS[currentDiscoIdx];
            }
        }

        function startGame() {
            bgMusic.currentTime = 0;
            bgMusic.play();
            clearInterval(discoTimer);
            clearTimeout(discoDelayTimeout);
            canvas.style.backgroundColor = '#1b1e2b';

            discoDelayTimeout = setTimeout(() => {
                if (gameState === 'PLAYING') discoTimer = setInterval(changeBackground, DISCO_INTERVAL);
            }, 24800);

            player.x = 200 - 26;
            obstacles = [];
            score = 0;
            scoreEl.innerText = `PUNKTEJ: 0`;
            gameState = 'PLAYING';
            lastSpawnTime = Date.now();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
        }

        function checkCollision(obs) {
            const margin = 8;
            const pLeft = player.x + margin, pRight = player.x + PLAYER_WIDTH - margin;
            const pTop = player.y + margin, pBottom = player.y + PLAYER_HEIGHT - margin;
            const inLineY = pBottom > obs.y && pTop < obs.y + LINIA_WYSOKOSC;
            const hitWallX = pLeft < obs.gapX || pRight > obs.gapX + PRZERWA_SZEROKOSC;
            return inLineY && hitWallX;
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            if (keys['ArrowLeft'] || touchLeft) player.x -= 8;
            if (keys['ArrowRight'] || touchRight) player.x += 8;

            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - PLAYER_WIDTH) player.x = canvas.width - PLAYER_WIDTH;

            const now = Date.now();
            if (now - lastSpawnTime > 1200) {
                const gapX = Math.floor(Math.random() * (canvas.width - PRZERWA_SZEROKOSC - 40)) + 20;
                obstacles.push({ y: -50, gapX: gapX });
                lastSpawnTime = now;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += PREDKOSC_STALA;
                if (checkCollision(obs)) {
                    gameState = 'GAMEOVER';
                    bgMusic.pause(); bgMusic.currentTime = 0;
                    crashSound.play();
                    clearInterval(discoTimer); clearTimeout(discoDelayTimeout);
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('babkaHighScore', highScore);
                    }
                    finalScoreEl.innerText = `WYNIKASZ: ${score}`;
                    highScoreEndEl.innerText = `TAVO GERAUSZASZ WYNIKASZ: ${highScore}`;
                    highScoreStartEl.innerText = `WYNIKASZ: ${highScore}`;
                    canvas.style.backgroundColor = '#1b1e2b';
                    gameOverScreen.style.display = 'block';
                }
                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = `PUNKTEJ: ${score}`;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = OBSTACLE_COLOR;
            obstacles.forEach(obs => {
                ctx.fillRect(0, obs.y, obs.gapX, LINIA_WYSOKOSC);
                const rX = obs.gapX + PRZERWA_SZEROKOSC;
                ctx.fillRect(rX, obs.y, canvas.width - rX, LINIA_WYSOKOSC);
            });

            let imgToShow = (gameState === 'GAMEOVER') ? babkaDeadImg : babkaImg;
            if (imgToShow.complete) {
                ctx.drawImage(imgToShow, player.x, player.y, PLAYER_WIDTH, PLAYER_HEIGHT);
            } else {
                ctx.fillStyle = (gameState === 'GAMEOVER') ? 'red' : 'white';
                ctx.fillRect(player.x, player.y, PLAYER_WIDTH, PLAYER_HEIGHT);
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }
        draw();
    </script>
</body>

</html>
